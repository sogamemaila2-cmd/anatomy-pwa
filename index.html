<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>GLB Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111827; color: #e2e8f0;
           font-family: -apple-system, sans-serif; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; }

    #ui {
      position: fixed; top: 16px; left: 16px; z-index: 999;
      background: rgba(15,23,42,.95);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px; padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
      width: min(280px, calc(100vw - 32px));
      backdrop-filter: blur(12px);
    }

    #ui h3 { font-size: 14px; color: #f1f5f9; }

    /* 原生 file input 直接顯示，唔隱藏 */
    #fi {
      width: 100%;
      font-size: 13px;
      color: #e2e8f0;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
    }
    /* Style the file button for webkit */
    #fi::-webkit-file-upload-button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      margin-right: 8px;
    }

    #msg {
      font-size: 12px; line-height: 1.6;
      white-space: pre-wrap; padding: 8px 10px;
      background: #0f172a; border-radius: 8px;
      min-height: 40px; color: #4ade80;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <h3>🦴 GLB Tester</h3>

  <!-- 直接顯示原生 file input，唔用任何 JS 觸發 -->
  <input id="fi" type="file" accept=".glb,.gltf"/>

  <div id="msg">等待載入...</div>
</div>

<script type="module">
import * as THREE from
  'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { OrbitControls } from
  'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from
  'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

const msg = document.getElementById('msg');
const fi  = document.getElementById('fi');

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('c'), antialias: true
});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setClearColor(0x111827);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.001, 1000);
camera.position.set(0, 1, 4);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 2));
const sun = new THREE.DirectionalLight(0xffffff, 2.5);
sun.position.set(5, 10, 5); scene.add(sun);
scene.add(new THREE.GridHelper(10, 20, 0x334155, 0x1e293b));

// ── Load GLB ──
const loader = new GLTFLoader();
let objUrl = null;

fi.addEventListener('change', e => {
  const file = e.target.files?.[0];
  if (!file) return;

  msg.style.color = '#facc15';
  msg.textContent = `讀取: ${file.name}\n大小: ${(file.size/1024/1024).toFixed(2)} MB`;

  if (objUrl) URL.revokeObjectURL(objUrl);
  objUrl = URL.createObjectURL(file);

  // 移除舊模型
  scene.children.filter(o => o.userData.isModel).forEach(o => scene.remove(o));

  loader.load(
    objUrl,
    gltf => {
      const model = gltf.scene;
      model.userData.isModel = true;

      // 自動置中縮放
      const box = new THREE.Box3().setFromObject(model);
      const sz  = new THREE.Vector3();
      const ctr = new THREE.Vector3();
      box.getSize(sz); box.getCenter(ctr);
      const scale = 2 / (Math.max(sz.x, sz.y, sz.z) || 1);
      model.scale.setScalar(scale);
      model.position.copy(ctr).multiplyScalar(-scale);
      scene.add(model);

      // 列出 mesh names
      const names = [];
      model.traverse(o => { if (o.isMesh) names.push(o.name || '(no name)'); });

      msg.style.color = '#4ade80';
      msg.textContent =
        `✅ 載入成功！\nMesh 數量: ${names.length}\n\n` +
        names.slice(0, 10).join('\n') +
        (names.length > 10 ? `\n...等共 ${names.length} 個` : '');

      console.log('ALL MESH NAMES:', names);
      URL.revokeObjectURL(objUrl); objUrl = null;
    },
    xhr => {
      if (xhr.total)
        msg.textContent = `載入中 ${((xhr.loaded/xhr.total)*100).toFixed(0)}%`;
    },
    err => {
      msg.style.color = '#f87171';
      msg.textContent = '❌ 失敗:\n' + (err?.message || JSON.stringify(err));
      console.error('LOAD ERROR:', err);
    }
  );
});

// ── Render loop ──
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

(function tick() {
  requestAnimationFrame(tick);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
