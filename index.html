<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>GLB Test</title>
  <style>
    body { margin:0; background:#111; color:#fff; font-family:sans-serif; }
    canvas { position:fixed; top:0; left:0; width:100%; height:100%; }
    #ui {
      position:fixed; top:20px; left:20px; z-index:99;
      display:flex; flex-direction:column; gap:10px;
    }
    #pickBtn {
      padding:14px 20px; font-size:16px; font-weight:bold;
      background:#2563eb; color:#fff; border:none;
      border-radius:12px; cursor:pointer;
    }
    #msg {
      padding:10px 14px; background:rgba(0,0,0,.8);
      border-radius:10px; font-size:14px; color:#4ade80;
      max-width:320px; white-space:pre-wrap;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <!-- 直接用 button 觸發，唔用 label -->
  <button id="pickBtn">📂 選 GLB 檔案</button>
  <input id="fi" type="file" accept=".glb" style="display:none"/>
  <div id="msg">等待載入...</div>
</div>
