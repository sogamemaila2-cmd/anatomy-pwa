<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>GLB Test</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#111827;overflow:hidden;font-family:-apple-system,sans-serif}
    #c{position:fixed;inset:0;width:100%;height:100%;pointer-events:none}
    #orbit{position:fixed;inset:0;z-index:1}
    #ui{
      position:fixed;top:16px;left:16px;z-index:9999;
      background:rgba(15,23,42,.97);
      border:1px solid rgba(255,255,255,.15);
      border-radius:14px;padding:14px;
      display:flex;flex-direction:column;gap:10px;
      width:min(300px,calc(100vw - 32px));color:#e2e8f0
    }
    h3{font-size:14px;color:#f1f5f9}
    #fi{
      display:block;width:100%;font-size:14px;color:#e2e8f0;
      background:#1e293b;border:2px solid #3b82f6;
      border-radius:10px;padding:10px;cursor:pointer
    }
    #fi::-webkit-file-upload-button{
      background:#2563eb;color:#fff;border:none;
      border-radius:6px;padding:7px 14px;font-size:13px;
      cursor:pointer;margin-right:8px
    }
    #fi::file-selector-button{
      background:#2563eb;color:#fff;border:none;
      border-radius:6px;padding:7px 14px;font-size:13px;
      cursor:pointer;margin-right:8px
    }
    #msg{
      font-size:12px;line-height:1.65;white-space:pre-wrap;
      padding:10px;background:#0f172a;border-radius:8px;
      min-height:44px;color:#4ade80
    }
    #hint{
      position:fixed;bottom:12px;left:50%;
      transform:translateX(-50%);z-index:9999;
      pointer-events:none;font-size:11px;color:#94a3b8;
      background:rgba(0,0,0,.5);padding:5px 14px;border-radius:20px
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="orbit"></div>
<div id="ui">
  <h3>🦴 GLB Tester</h3>
  <input id="fi" type="file" accept=".glb,.gltf"/>
  <div id="msg">⏳ 載入中...</div>
</div>
<div id="hint">Drag = orbit · Pinch = zoom</div>

<!-- UMD 版本：順序很重要，three 要最先 -->
<script src="./libs/three.min.js"></script>
<script src="./libs/OrbitControls.js"></script>
<script src="./libs/GLTFLoader.js"></script>

<script>
// 唔用 type="module"，直接用全域 THREE
var msg = document.getElementById('msg');

if (typeof THREE === 'undefined') {
  msg.style.color = '#f87171';
  msg.textContent = '❌ THREE 未載入\n請確認 libs/ 資料夾有 3 個 JS 檔案';
} else {
  msg.textContent = '✅ Three.js 就緒\n請選擇 GLB 檔案';

  var renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById('c'), antialias: true
  });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.setClearColor(0x111827);

  var scene  = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.001, 1000);
  camera.position.set(0, 1, 4);

  var controls = new THREE.OrbitControls(camera, document.getElementById('orbit'));
  controls.enableDamping = true;

  scene.add(new THREE.AmbientLight(0xffffff, 2));
  var sun = new THREE.DirectionalLight(0xffffff, 2.5);
  sun.position.set(5, 10, 5); scene.add(sun);
  scene.add(new THREE.GridHelper(10, 20, 0x334155, 0x1e293b));

  var loader = new THREE.GLTFLoader();

  document.getElementById('fi').addEventListener('change', function(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;

    msg.style.color = '#facc15';
    msg.textContent = '📦 ' + file.name + '\n' + (file.size/1024/1024).toFixed(2) + ' MB';

    var reader = new FileReader();

    reader.onload = function(ev) {
      msg.textContent = '⏳ 解析中...';

      scene.children.filter(function(o){ return o.userData.isModel; })
        .forEach(function(o){ scene.remove(o); });

      loader.parse(
        ev.target.result, '',
        function(gltf) {
          var model = gltf.scene;
          model.userData.isModel = true;

          var box = new THREE.Box3().setFromObject(model);
          var sz  = new THREE.Vector3();
          var ctr = new THREE.Vector3();
          box.getSize(sz); box.getCenter(ctr);
          var s = 2 / (Math.max(sz.x, sz.y, sz.z) || 1);
          model.scale.setScalar(s);
          model.position.copy(ctr).multiplyScalar(-s);
          scene.add(model);

          var names = [];
          model.traverse(function(o){ if(o.isMesh) names.push(o.name || '(no name)'); });

          msg.style.color = '#4ade80';
          msg.textContent =
            '✅ 成功！Meshes: ' + names.length + '\n\n' +
            names.slice(0,12).join('\n') +
            (names.length > 12 ? '\n...共 ' + names.length + ' 個' : '');

          console.log('MESH NAMES:', names);
        },
        function(err) {
          msg.style.color = '#f87171';
          msg.textContent = '❌ 解析失敗:\n' + (err && err.message || String(err));
          console.error(err);
        }
      );
    };

    reader.onerror = function() {
      msg.style.color = '#f87171';
      msg.textContent = '❌ FileReader 失敗';
    };

    reader.readAsArrayBuffer(file);
  });

  window.addEventListener('resize', function() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  (function tick() {
    requestAnimationFrame(tick);
    controls.update();
    renderer.render(scene, camera);
  })();
}
</script>
</body>
</html>
