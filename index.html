<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>GLB Test</title>
  <style>
    body { margin:0; background:#111; }
    canvas { display:block; width:100vw; height:100vh; }
    #ui {
      position:fixed; top:10px; left:10px; z-index:10;
      display:flex; flex-direction:column; gap:8px;
    }
    label, #msg {
      background:rgba(0,0,0,.7); color:#fff;
      padding:8px 12px; border-radius:8px; font-size:13px;
      font-family:sans-serif; cursor:pointer;
    }
    #msg { color:#4ade80; min-height:18px; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <label>
    📂 選 GLB 檔案
    <input id="fi" type="file" accept=".glb,.gltf" style="display:none"/>
  </label>
  <div id="msg">等待載入...</div>
</div>

<script type="module">
import * as THREE from
  'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { OrbitControls } from
  'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from
  'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

const msg = document.getElementById('msg');

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('c'),
  antialias: true
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setClearColor(0x111111);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
  45, window.innerWidth / window.innerHeight, 0.001, 1000
);
camera.position.set(0, 1, 3);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const dir = new THREE.DirectionalLight(0xffffff, 2);
dir.position.set(5, 10, 5);
scene.add(dir);

// Grid
scene.add(new THREE.GridHelper(10, 20, 0x444444, 0x222222));

// ── Load GLB ──
const loader = new GLTFLoader();

document.getElementById('fi').addEventListener('change', e => {
  const file = e.target.files?.[0];
  if (!file) return;

  msg.style.color = '#facc15';
  msg.textContent = `載入中: ${file.name} (${(file.size/1024/1024).toFixed(1)} MB)`;

  const url = URL.createObjectURL(file);

  loader.load(
    url,
    gltf => {
      // 清除舊模型
      scene.children
        .filter(o => o.userData.isModel)
        .forEach(o => scene.remove(o));

      const model = gltf.scene;
      model.userData.isModel = true;

      // 自動縮放 + 置中
      const box    = new THREE.Box3().setFromObject(model);
      const size   = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      model.scale.setScalar(2 / maxDim);
      model.position.sub(center.multiplyScalar(2 / maxDim));

      scene.add(model);
      URL.revokeObjectURL(url);

      // 統計 mesh 數量
      let meshCount = 0, meshNames = [];
      model.traverse(o => {
        if (o.isMesh) {
          meshCount++;
          if (o.name) meshNames.push(o.name);
        }
      });

      msg.style.color = '#4ade80';
      msg.textContent =
        `✅ 載入成功！Meshes: ${meshCount}` +
        (meshNames.length
          ? `\nMesh names: ${meshNames.slice(0,5).join(', ')}${meshNames.length>5?'...':''}`
          : '\n(無 mesh name)');

      console.log('All mesh names:', meshNames);
    },
    xhr => {
      if (xhr.total) {
        const p = ((xhr.loaded / xhr.total) * 100).toFixed(0);
        msg.style.color = '#facc15';
        msg.textContent = `載入中: ${p}%`;
      }
    },
    err => {
      msg.style.color = '#f87171';
      msg.textContent = '❌ 載入失敗: ' + (err.message || err);
      console.error('GLB load error:', err);
    }
  );
});

// ── Render loop ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

(function tick() {
  requestAnimationFrame(tick);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
